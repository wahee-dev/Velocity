name: Build Velocity (Linux)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - run: bun install

      - name: Create .env from .env.example
        run: cp .env.example .env && cp .env.example src-tauri/.env

      - name: Build frontend
        run: bun run build

      - name: Build Tauri app (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Velocity ${{ github.ref_name }}
          releaseBody: "See [CHANGELOG](https://github.com/wahee-dev/Velocity/blob/main/CHANGELOG.md) for details."

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: velocity-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload .AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: velocity-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
