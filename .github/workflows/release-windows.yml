name: Build Velocity (Windows)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - run: bun install

      - name: Create .env from .env.example
        shell: bash
        run: cp .env.example .env && cp .env.example src-tauri/.env

      - name: Build frontend
        run: bun run build

      - name: Build Tauri app (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: velocity-windows-msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

      - name: Upload .exe (NSIS) artifact
        uses: actions/upload-artifact@v4
        with:
          name: velocity-windows-nsis
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
