name: Build Velocity (macOS)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - run: bun install

      - name: Create .env from .env.example
        run: cp .env.example .env && cp .env.example src-tauri/.env

      - name: Build frontend
        run: bun run build

      - name: Build Tauri app (macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: velocity-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload .app.zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: velocity-macos-zip
          path: src-tauri/target/release/bundle/macos/*.app.zip
